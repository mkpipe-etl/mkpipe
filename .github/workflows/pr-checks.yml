name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: Validate PR Title and Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows conventional commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR Title: $PR_TITLE"
          if ! echo "$PR_TITLE" | grep -qE "^(feat|fix|chore|docs|refactor|test|ci)(\(.+\))?: .+"; then
            echo "❌ PR title must follow conventional commit format"
            echo "   Valid: feat(scope): description"
            echo "   Valid types: feat, fix, chore, docs, refactor, test, ci"
            exit 1
          fi
          echo "✅ PR title is valid"

      - name: Check branch name convention
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          echo "Branch: $BRANCH"
          if ! echo "$BRANCH" | grep -qE "^(feature|fix|chore|docs|hotfix)/"; then
            echo "❌ Branch must start with feature/, fix/, chore/, docs/, or hotfix/"
            exit 1
          fi
          echo "✅ Branch name is valid"
